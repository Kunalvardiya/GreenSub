<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — GreenSub</title>
    <meta name="description"
        content="Sign in or create an account to access GreenSub's AI-powered waste identification and reuse platform." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="auth-body">

    <div class="auth-wrapper">
        <!-- Floating particles background -->
        <div class="auth-particles" id="authParticles"></div>

        <div class="auth-card" id="authCard">
            <!-- Logo -->
            <div class="auth-logo">
                <a href="/">🌿 Green<span>Sub</span></a>
            </div>

            <!-- Tab Toggle -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin" data-tab="login">Sign In</button>
                <button class="auth-tab" id="tabRegister" data-tab="register">Create Account</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="auth-input" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="auth-input" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary auth-submit" id="btnLogin">
                    🔓 Sign In
                </button>
            </form>

            <!-- Register Form (hidden by default) -->
            <form class="auth-form" id="registerForm" style="display:none">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" class="auth-input" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" class="auth-input" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" class="auth-input" placeholder="Min 6 characters"
                        minlength="6" required />
                </div>
                <button type="submit" class="btn btn-primary auth-submit" id="btnRegister">
                    🌱 Create Account
                </button>
            </form>

            <!-- Error/Success message -->
            <div class="auth-message" id="authMessage"></div>

            <p class="auth-footer-text">
                By continuing you agree to GreenSub's eco-friendly mission 🌍
            </p>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
